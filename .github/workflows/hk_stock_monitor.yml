name: 港股利好監控（新版300-400隻RSS掃描）
on:
  schedule:
    - cron: '0 */6 * * *' # UTC每6小時自動觸發，程式內隨機延遲0-30分鐘防風控
  workflow_dispatch: # 支援手動一鍵測試運行
jobs:
  scan_task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置Python3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安裝依賴套件
        run: pip install -r requirements.txt
      - name: 讀取推送緩存（避免48小時內重複推送同一利好）
        uses: actions/cache@v4
        with:
          path: push_cache.json
          key: ${{ runner.os }}-stock-bullish-cache
      - name: 執行港股新聞掃描與AI分析
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STOCK_POOL: ${{ secrets.STOCK_POOL }}
        run: python main.py
      - name: 保存推送緩存
        uses: actions/cache@v4
        with:
          path: push_cache.json
          key: ${{ runner.os }}-stock-bullish-cache
